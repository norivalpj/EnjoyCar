[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@google/genai"]

[[redirects]]
  from = "/api/extract-data"
  to = "/.netlify/functions/extract-data"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
